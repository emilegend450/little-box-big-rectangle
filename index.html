//source to store all current classes
//class made to create shapes of any variety as documented by matter.js
class Shapes {
  //method to create multiple rectangles
  static createBox(x, y, width, height, options){
    var rectangle = Matter.Bodies.rectangle(x, y, width, height, options);
    Matter.Composite.add(engine.world, rectangle);
    return rectangle;  
  }
  //method to create multiple circles
  static createCircle(x, y, radius, options){
    var circle = Matter.Bodies.circle(x, y, radius, options);
    Matter.Composite.add(engine.world, circle);
    return circle;
  }
  //method to create polygons
  static createPoly(x, y, sides, radius, options){
    var polygon = Matter.Bodies.polygon(x, y, sides, radius, options);
    Matter.Composite.add(engine.world, polygon);
    return polygon;
  }
  //method to create trapezoids
  static createTrap(x, y, width, height, slope, options){
    var trap = Matter.Bodies.trapezoid(x, y, width, height, slope, options);
    Matter.Composite.add(engine.world, trap);
    return trap;
  }
}

//class to create characters
//it's basically just a rewrite of shapes, but instead has sprites attached to a rectangular hitbox
class Characters {
  //constructor to define attributes of the character
  //can leave width, height, and options empty if unecessary
  //will simply leave width and height to be the width and height of the sprite and options as default values
  constructor(icon, x, y, width, height, options){
    this.icon = icon;
    this.x = x;
    this.y = y;
    //manually sets width and height to sprite values if width and height parameters are blank
    if(width !== undefined || height !== undefined){
      this.width = width;
      this.height = height;  
    } else {
      this.width = sprites[icon].width;
      this.height = sprites[icon].height;
    }
    //unpacks the objects in options to be added to other options
    //setting the inertia to infinity guarantees the object spawns upright
    var bodyOptions = {...options, inertia: Infinity};
    var body = Shapes.createBox(this.x, this.y, this.width, this.height, bodyOptions);
    //generalizes character calls so that normal matter.js syntax can be called
    //can use sprite.position.x instead of sprite.body.position.x
    body.icon = this.icon
    body.width = this.width
    body.height = this.height
    body.WASD = this.WASD
    body.ARROWS = this.ARROWS
    body.draw = this.draw
    return body
  }
  //generic movement code that alters postion and not velocity
  //controls based on arrow keys
  ARROWS(){
  var step = 3; 
  var targetX = this.position.x;
  var targetY = this.position.y;
  if(keyboard.ARROWLEFT){
    targetX = targetX - step;
  }
  if(keyboard.ARROWRIGHT){
    targetX = targetX + step;
  }
  if(keyboard.ARROWUP){
    targetY = targetY + step;
  }
  if(keyboard.ARROWDOWN){
    targetY = targetY - step;
  }
  Matter.Body.setPosition(this, {x: targetX, y: targetY});
  }
  //draws both a small neon box to indicate the hitbox and the actual sprite itsef
  draw(){
    screen.drawRect(this.position.x, this.position.y, this.width, this.height);
    screen.drawSprite(this.icon, this.position.x, this.position.y, this.width, this.height);
  }
}

        pogo = false

      (pair.bodyA == player && pair.bodyB.label == "boss")||
      (pair.bodyA.label == "boss" && pair.bodyB == player)){
        if(playerIFrames == 0){
          health--

        }
      }
      //player hitting the boss or its attacks
      if((pair.bodyA.label == "attack" && (pair.bodyB.label == "boss" || pair.bodyB.label == "hazard"))||
      ((pair.bodyA.label == "boss" || pair.bodyA.label == "hazard") && pair.bodyB.label == "attack")){
        if(pair.bodyA.label == "hazard" || pair.bodyB.label == "hazard"){
        }else{
          bossHealth--
        }
        if(vesseliframes == 0 && down == true){
          pogo = true
          hasDouble = true
          hasDash = true
          Matter.Body.setVelocity(player, {x: player.velocity.x, y: 3})
        }
      }
      //resetting double jump on pogo
      if((pair.bodyA.label == "attack" && pair.bodyB.label == "hazard")){
        hasDouble = true
      }else if (pair.bodyA.label == "hazard" && pair.bodyB.label == "attack"){
        hasDouble = true

    })
  })
  //player is not on ground if not touching ground
  Matter.Events.on(engine, "collisionEnd", function(event){
    event.pairs.forEach(function(pair) {
      if((pair.bodyA == player && pair.bodyB.label == "ground") ||
      (pair.bodyA.label == "ground" && pair.bodyB == player)){
        playerGrounded = false
      }
    })
  })
}

function hitboxes(){
  //stores all physics bodies in the simulation
  var allBodies = Matter.Composite.allBodies(engine.world);
  //loop to go through each body
  for (var i = 0; i < allBodies.length; i++) {
    var body = allBodies[i];
    //stores each body's vertices
    var vertices = body.vertices;
    //stores that bodies coordinates
    var polyCoordinates = [];
    //takes the x and y coordinates out of the list
    for (var j = 0; j < vertices.length; j++) {
      polyCoordinates.push(vertices[j].x);
      polyCoordinates.push(vertices[j].y);
    }
    //draws the body based off the vertices
    if(allBodies[i].label == "hazard"){
      screen.drawPolygon(polyCoordinates, "rgb(255, 0, 0)")
    }else if(allBodies[i].label == "warning"){
      screen.drawPolygon(polyCoordinates, "rgb(255, 255, 0)")
    }else if(allBodies[i].label == "wallLeft" || allBodies[i].label == "wallRight" || allBodies[i].label == "ground"){
      screen.drawPolygon(polyCoordinates, "rgb(255, 255, 255)")
    }else if(allBodies[i].label == "boss"){
      screen.drawPolygon(polyCoordinates, "rgb(73, 216, 230)")
    }else if(allBodies[i].label == "player"){
      screen.drawPolygon(polyCoordinates, "rgb(0, 255, 0)")
    }else{
      screen.drawPolygon(polyCoordinates, "rgb(0, 255, 0)")
    }
  }
}

//function that stores the player's initial conditions
function initPlayer(){
  //adds the player
  //determines if the player can double jump
  hasDouble = false
  hasDash = false
  cancleDash = false
  playerHeight = 15
  playerWidth = 10
  dashTimer = 0
  dashCooldown = 0
  playerIFrames = 0
  playerDirection = "right"
  player = Matter.Bodies.rectangle(0, 0, playerWidth, playerHeight, {
    friction: 0,
    restitution: 0,
    label: "player",
  })
  Matter.Composite.add(engine.world, player)
}
//function to update the player
function updatePlayer(){
  //gravity
  Matter.Body.applyForce(player, player.position, { x: 0, y: -0.000075 })
  //counts the player's invincibilyt frames down
  if(playerIFrames > 0){
    playerIFrames--
  }
  //makes sure that the player is above the floor
  if(player.position.y < floor.position.y){
    Matter.Body.setPosition(player, {x:player.position.x, y:floor.position.y+floorHeight/2+playerHeight/2})
  }
  //jump
  if(keyboard.press.SPACE){
    if(playerGrounded){
      Matter.Body.setVelocity(player, { x: player.velocity.x, y: 5})
      hasDouble = true
    }else if(hasDouble){
      Matter.Body.setVelocity(player, { x: player.velocity.x, y: 3})
      hasDouble = false
      pogo = false
    }
  }
  //prevents mid air stops by tapping W then tapping again
  if(pogo == false && playerGrounded == false && (keyboard.SPACE == false) && player.velocity.y>0){
    Matter.Body.setVelocity(player, { x: player.velocity.x, y: -1})
  }
  //left and right movement
  if(keyboard.A){
    Matter.Body.setVelocity(player, { x: -3, y: player.velocity.y})
    playerDirection = "left"
  } else if(keyboard.D){
    Matter.Body.setVelocity(player, { x: 3, y: player.velocity.y})
    playerDirection = "right"
  } else if (attackTimer < 20){
    Matter.Body.setVelocity(player, { x: 0, y: player.velocity.y})
  }
  //sets max fall speed to -5
  if(player.velocity.y<-5){
    Matter.Body.setVelocity(player,{x: player.velocity.x, y: -5})
  }
  //dashing
  if(playerGrounded){
    hasDash = true
  }
  if(keyboard.press.SHIFT && dashTimer == 0 && dashCooldown == 0 && hasDash){
    //setting attackTimer to 0 cancels whatever attack the player is currently doing
    attackTimer = 0
    //dashTimer stores how long the player dashes for
    dashTimer = 8
    //dashHeight is used to hold the y value of the player constant while dashing
    dashHeight = player.position.y
    //dashCooldown sets the cooldown between dashes
    dashCooldown = 5
    //playDashDirection is needed so the player can't switch dash midway through
    playerDashDirection = playerDirection
    hasDash = false
    Matter.Body.setVelocity(player, {x:0,y:0})
  }
  if(dashTimer > 0){
    if(playerDashDirection == "right"){
      Matter.Body.setPosition(player, {x: player.position.x+8, y: dashHeight})
    }else{
      Matter.Body.setPosition(player, {x: player.position.x-8, y: dashHeight})
    }
    dashTimer--
  }
  if(dashTimer == 0 && dashCooldown > 0){
    dashCooldown--
  }
  //prevents player from going out of bounds
  if(player.position.x<lwall.position.x+9){
    Matter.Body.setPosition(player, {x: lwall.position.x+10, y:player.position.y})
  }
  if(player.position.x>rwall.position.x-9){
    Matter.Body.setPosition(player, {x: rwall.position.x-10, y:player.position.y})
  }
  //death screem
  if(health == 0){
    bossAttackCycle = false
    Matter.Body.setPosition(vessel, {x: 0, y: 1000})
    bossHealth = 100
    //removes all hazard
    var allCurrentBodies = Matter.Composite.allBodies(engine.world)
    for(var i = 0; i < allCurrentBodies.length; i++){
      if(allCurrentBodies[i].label == "warning" || allCurrentBodies[i].label == "hazard"){
        Matter.Composite.remove(engine.world, allCurrentBodies[i])
      }
    }
  }
}

function initBoss(){
  //developmental variables for giving the boss invincibility frames and for its attack cycle
  vesseliframes = 0
  bossAttackCycle = false
  //creating the boss itself and spawning him off screen
  vessel = new Characters("purevessel", 0, 1000, 40, 60, {isSensor: true, label: "boss"});
  //list storing the moveset of all possible attacks
  moves = [0, 1, 2, 3, 4, 5, 6, 7]
  moveChoice = null
  delayMove = 0
}
//function to udpate the boss
function updateBoss(){
  //resets the boss
  if(keyboard.ENTER){
    if(bossAttackCycle == false){
      audio.playMusic("purevessel", .3)
      Matter.Body.setPosition(vessel, {x:175, y: -65})
      health = 5
      delayMove = 100
      bossHealth = 100
      moveChoice = -1
      initSpikes()
    }
    bossAttackCycle = true
  }
  //determines if the boss can attack again
  if(bossAttackCycle){
    if(delayMove>0){
      delayMove--
    }
    //choose a new random move after a certain interval
    if(delayMove == 0){
      moveChoice = moves[Math.floor(Math.random() * moves.length)]
      if(moveChoice == 0){
        bossJumpFull()
        delayMove = 50
      } else if(moveChoice == 1){
        bossTeleportFull()
        delayMove = 100
      }else if(moveChoice == 2){
        dash()
        delayMove = 100
      }else if(moveChoice == 3){
        focus()
        delayMove = 250
      }else if(moveChoice == 4){
        legs()
        delayMove = 150
      }else if(moveChoice == 5){
        rockets()
        delayMove = 100
      }else if(moveChoice == 6){
        spikes()
        delayMove = 150
      }else if(moveChoice == 7){
        slash()
        delayMove = 150
      }
    }
  }
  //lowers the boss's i-frames after being hurt
  if(vesseliframes > 0){
    vesseliframes--
  }
  //ensures the boss can't walk/dash/teleport off screen
  if(vessel.position.x<lwall.position.x+20){
    Matter.Body.setPosition(vessel, {x: lwall.position.x+24, y:vessel.position.y})
  }
  if(vessel.position.x>rwall.position.x-20){
    Matter.Body.setPosition(vessel, {x: rwall.position.x-24, y:vessel.position.y})
  }
  //moves the boss off screen once it dies
  if(bossHealth == 0){
    bossAttackCycle = false
    Matter.Body.setPosition(vessel, {x: 0, y: 1000})
    //removes all hazard
    var allCurrentBodies = Matter.Composite.allBodies(engine.world)
    for(var i = 0; i < allCurrentBodies.length; i++){
      if(allCurrentBodies[i].label == "warning" || allCurrentBodies[i].label == "hazard"){
        Matter.Composite.remove(engine.world, allCurrentBodies[i])
      }
    }
  }
  //makes sure the boss does get negative health after death
  if(bossHealth < 0){
    bossHealth = 0
  }
}



function initBossJump(){
  jumpingTo = null
  bossJumpTimer = 0
}
//makes the boss jump across the screen
function bossJumpFull(){
  //determines if the boss will jump to the left or right
  if(vessel.position.x>0){
    jumpingTo = "left"
    jumpRadius = (vessel.position.x+180)/2
    jumpCenter = vessel.position.x-jumpRadius
    jumpCurrentTheta = 0
  }else{
    jumpingTo = "right"
    jumpRadius = (180-vessel.position.x)/2
    jumpCenter = vessel.position.x+jumpRadius
    jumpCurrentTheta = Math.PI
  }
  bossJumpTimer = 30
  jumpDeltaTheta = Math.PI/bossJumpTimer
}
//function to make the boss jump above you
function bossJumpTop(){
  //determines if the boss will jump to the left or right
  if(vessel.position.x>0){
    jumpingTo = "left"
    jumpRadius = 120
    jumpCenter = vessel.position.x-jumpRadius
    jumpCurrentTheta = 0
  }else{
    jumpingTo = "right"
    jumpRadius = 120
    jumpCenter = vessel.position.x+jumpRadius
    jumpCurrentTheta = Math.PI
  }
  
  bossJumpTimer = 15
  jumpDeltaTheta = Math.PI/bossJumpTimer/2
}
//makes the boss jump to the opposite side of the player
function bossJumpOpposite(){
  //determines if the boss will jump to the left or right
  if(player.position.x>0){
    jumpingTo = "left"
    jumpRadius = (vessel.position.x+180)/2
    jumpCenter = vessel.position.x-jumpRadius
    jumpCurrentTheta = 0
  }else{
    jumpingTo = "right"
    jumpRadius = (180-vessel.position.x)/2
    jumpCenter = vessel.position.x+jumpRadius
    jumpCurrentTheta = Math.PI
  }
  bossJumpTimer = 30
  jumpDeltaTheta = Math.PI/bossJumpTimer
}
//function to update the boss's jump
function updateBossJump(){
  if(bossJumpTimer > 0){
    if(jumpingTo == "left"){
      jumpCurrentTheta+=jumpDeltaTheta
      Matter.Body.setPosition(vessel, {x: jumpCenter + jumpRadius*Math.cos(jumpCurrentTheta), y: -65+jumpRadius*Math.sin(jumpCurrentTheta)})
    }else if(jumpingTo == "right"){
      jumpCurrentTheta-=jumpDeltaTheta
      Matter.Body.setPosition(vessel, {x: jumpCenter + jumpRadius*Math.cos(jumpCurrentTheta), y: -65+jumpRadius*Math.sin(jumpCurrentTheta)})
    }
    
  }
  bossJumpTimer--
}

function initBossTeleport(){
  teleportFull = false
  teleportTop = false
  teleportOpposite = false
  //delay used to 
  teleportDelay = 0
  teleportWarnings = []
  teleportWarningMade = false
}
//teleports the boss to the other side of the screen
function bossTeleportFull(){
  teleportDelay = 20
  teleportFull = true
}
//teleports the boss above the player
function bossTeleportTop(){
  teleportDelay = 20
  teleportTop = true
}
//teleports the boss to the side of the screen opposite to the player
function bossTeleportOpposite(){
  teleportDelay = 20
  teleportOpposite = true
}
function updateBossTeleport(){
  if(teleportDelay > 0){
    teleportDelay--
  }
  if(teleportFull == true && teleportDelay == 0){
  //determines if the boss will teleport to the left or right
    if(vessel.position.x>0){
      Matter.Body.setPosition(vessel, {x:-180,y:-65})
    }else{
      Matter.Body.setPosition(vessel, {x:180,y:-65})
    }
    teleportFull = false
    Matter.Composite.remove(engine.world, teleportWarnings)
    teleportWarningMade = false
  }
  if(teleportFull == true && teleportDelay > 0 && teleportWarningMade == false){
    if(vessel.position.x>0){
      teleportWarnings.push(Shapes.createBox(-180, -65, 20, 20, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1}))
    }else{
      teleportWarnings.push(Shapes.createBox(180, -65, 20, 20, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1}))
    }
    teleportWarningMade = true
  }
  if(teleportTop == true && teleportDelay == 0){
    Matter.Body.setPosition(vessel, {x:bossTeleportX,y:bossTeleportY})
    teleportTop = false
    Matter.Composite.remove(engine.world, teleportWarnings)
    teleportWarningMade = false
  }
  if(teleportTop == true && teleportDelay > 0 && teleportWarningMade == false){
    //conditional to ensure the boss does not clip into the wall
    if(player.position.x<-195){
      bossTeleportX = -195
    }else if(player.position.x>195){
      bossTeleportX = 195
    }else{
      bossTeleportX = player.position.x
    }
    bossTeleportY = player.position.y+130
    teleportWarnings.push(Shapes.createBox(bossTeleportX, bossTeleportY, 20, 20, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1}))
    teleportWarningMade = true
  }
  if(teleportOpposite == true && teleportDelay == 0){
    //determines if the boss will teleport to the left or right
    if(teleportDirection == "left"){
      Matter.Body.setPosition(vessel, {x:-180,y:-65})
    }else{
      Matter.Body.setPosition(vessel, {x:180,y:-65})
    }
    teleportOpposite = false
    teleportWarningMade = false
    Matter.Composite.remove(engine.world, teleportWarnings)
  }
  if(teleportOpposite == true && teleportDelay > 0 && teleportWarningMade == false){
    if(player.position.x>0){
      teleportDirection = "left"
      teleportWarnings.push(Shapes.createBox(-180, -65, 20, 20, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1}))
    }else{
      teleportDirection = "right"
      teleportWarnings.push(Shapes.createBox(180, -65, 20, 20, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1}))
    }
    teleportWarningMade = true
  }
}

function initDash(){
  attackingDash = false
  //sets the time the boss dashes for
  bossDashTimer = 0
  //sets the time the warning for the dash is out for
  warningDashTimer = 0
  dashWarningDrawn = false
  
}
//function to start the dash
function dash(){
  //initial conditions for dash
  warningDashTimer = 50
  bossDashTimer = 15
  attackingDash = true
  dashWarningDrawn = false
  playerToBossDirection = player.position.x-vessel.position.x
  //determines if dash goes left or right
  if(playerToBossDirection<0){
    bossDashDirection = "left"
  }else{
    bossDashDirection = "right"
  }
}
//function to update the dshing
function updateDash(){
  //draws the warning for the dash
  if(warningDashTimer>0 && dashWarningDrawn == false){
    dashWarningDrawn = true
    if(bossDashDirection == "left"){
      dashWarning = Shapes.createBox(vessel.position.x-120, vessel.position.y, 200, 50, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1})
    } else{
      dashWarning = Shapes.createBox(vessel.position.x+120, vessel.position.y, 200, 50, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1})
    }
  }
  //ticks down the delay between the warning for the dash and the dash itself
  if(warningDashTimer>0 && dashWarningDrawn){
    warningDashTimer--
  }
  if(bossDashTimer > 0 && warningDashTimer == 0){
    bossDashTimer--
    //preventing the boss from dashing off the screen
    if(vessel.position.x-lwall.position.x-25<15 && bossDashDirection == "left"){
      bossDashLength = vessel.position.x-lwall.position.x-25
    }else if(rwall.position.x-vessel.position.x-25<15 && bossDashDirection == "right"){
      bossDashLength = rwall.position.x-vessel.position.x-25
    }else{
      bossDashLength = 15
    }
    //moves the boss when dashing
    if(bossDashDirection == "left"){
      Matter.Body.setPosition(vessel,{x:vessel.position.x - bossDashLength, y: vessel.position.y})
    } else{
      Matter.Body.setPosition(vessel,{x:vessel.position.x + bossDashLength, y: vessel.position.y})
    }
  }
  if(bossDashTimer == 0 && attackingDash){
    Matter.Composite.remove(engine.world, dashWarning)
    attackingDash = false
  }
}

  randomy = 0

  removingWarningCircles = false

  randomx = (Math.random() * (screen.width/5)) - (screen.width/2);
  randomy = (Math.random() * (screen.height*0.1)) + (screen.height/2) - (screen.height*0.9)
}

    warningMainAura = Shapes.createCircle(vessel.position.x, vessel.position.y, 130, {isSensor: true, label: "warning"})

    warningFocusCircles.push(warningCircle0)
  }
  if(focusTimer < 278 && focusTimer > 249 && attackingFocus == true && warningSmallCirclesComplete == false){
  if(focusTimer % 6 == 0 && warningCircleCountingUp < 6){
    var circleName = "warningCircle" + warningCircleCountingUp
    if(warningCircleCountingUp % 2 != 0){
      if(randomy <= 0){
        window[circleName] = Shapes.createCircle((warningCircleCountingUp * circleDistances + randomx), randomy + 30, 30, {isSensor: true, label: "warning"})
      } else {
        window[circleName] = Shapes.createCircle((warningCircleCountingUp * circleDistances) + randomx, randomy - 30, 30, {isSensor: true, label: "warning"})

      window[circleName] = Shapes.createCircle((warningCircleCountingUp * circleDistances + randomx), randomy, 30, {isSensor: true, label: "warning"})
    }
    warningFocusCircles.push(window[circleName])

      warningCircleCountingUp = 0
      warningSmallCirclesComplete = true
    }
  }
  if(focusTimer == 220 && attackingFocus == true){
    for(var k = 0; k < 6; k++){
      Matter.Composite.remove(engine.world, warningFocusCircles[k])
    }
  }
  //main code to spawn the circles that actually do the damage
  if(focusTimer == 200 && attackingFocus == true && mainComplete == false){
    mainAura = Shapes.createCircle(vessel.position.x, vessel.position.y, 130, {isSensor: true, label: "hazard"})
    mainComplete = true
  }
  if(focusTimer == 180 && attackingFocus == true){
    Matter.Composite.remove(engine.world, mainAura)
  }
  if(focusTimer == 175 && attackingFocus == true){
    circle0 = Shapes.createCircle(randomx, randomy, 30, {isSensor:true, label: "hazard"})
    focusCircles.push(circle0)
  }
  if(focusTimer < 175 && focusTimer > 135 && attackingFocus == true && smallCirclesComplete == false){
    if(focusTimer % 6 == 0 && circleCountUp < 6){
      var circleName = "circle" + circleCountUp
    if(circleCountUp % 2 != 0){
      if(randomy <= 0){
        window[circleName] = Shapes.createCircle((circleCountUp * circleDistances + randomx), randomy + 30, 30, {isSensor: true, label: "hazard"})
      } else {
        window[circleName] = Shapes.createCircle((circleCountUp * circleDistances) + randomx, randomy - 30, 30, {isSensor: true, label: "hazard"})
      }
    } else if(circleCountUp % 2 == 0){
      window[circleName] = Shapes.createCircle((circleCountUp * circleDistances + randomx), randomy, 30, {isSensor: true, label: "hazard"})
    }
  focusCircles.push(window[circleName])
  circleCountUp++
    }
    if(circleCountUp == 6){
      circleCountUp = 0
      smallCirclesComplete = true
    }
  }
  //removes the attacks one by one after a certain increment of time
  if(focusTimer <= 135 && attackingFocus == true){
    if(focusTimer%7 == 0 && circleCountUp < 6){
      Matter.Composite.remove(engine.world, focusCircles[circleCountUp])
      circleCountUp++
    }
    if(focusTimer == 90){
      focusTimer = 0
    }
  }
  // Reset attack flags
  if(focusTimer == 0 && attackingFocus == true){
    attackingFocus = false
    circleCountUp = 1
    mainComplete = false
    smallCirclesComplete = false
    removingCircles = false
    focusCircles = []
    
    warningFocusCircles = []
    warningMainComplete = false
    warningSmallCirclesComplete = false
    removingWarningCircles = false
    warningCircleCountingUp = 1
    
  }
  // Handle the frame countdown
  if(focusTimer > 0){
    focusTimer--
  }
}

//defining variables for rockets
function initRockets(){
  //defining the timer and whether the boss is rocketing
  rocketInterval = 0
  currentlyRocketing = false
}
//function called whenver rockets is called
function rockets(){
  //changes boss position before starting the rockets attack
  if(Math.random() < 0.5) {
    bossJumpOpposite()
  } else {
    bossTeleportOpposite()
  }
  //initial conditions for rocketing to start
  currentlyRocketing = true
  rocketInterval = 100
}
//function to change rockets depending on time
function updateRockets(){
  //about 1 second occurs before rockets begins to allow for the movement to occur before launching rockets
  if(rocketInterval == 45){
    //creates all the rockets that changes based off of angle
    for(var i=0; i < 8; i++){
      var name = "rocket" + i
      var angle
      var vector
      if(vessel.position.x < 0){
        angle = (Math.PI * i)/10 - Math.PI/6
        vector = Matter.Vector.rotate({x: 5 + 0.375 * i, y: 0}, angle)
        name = Shapes.createBox(vessel.position.x + 20, vessel.position.y + 30, 30, 4, {isSensor: true, angle: angle, label: "hazard", frictionAir: 0})
      }
      if(vessel.position.x > 0){
        angle = -(Math.PI * i)/10 - (Math.PI * 5)/6
        vector = Matter.Vector.rotate({x: 5 + 0.375 * i, y:0}, angle)
        name = Shapes.createBox(vessel.position.x - 20, vessel.position.y + 30, 30, 4, {isSensor: true, angle: angle, label: "hazard", frictionAir: 0})
      }
      Matter.Body.setVelocity(name, vector)
    }
  }
  //timer for counting down
  if(rocketInterval > 0){
    rocketInterval--
  }
  //resets all variables for rocketing to be called again
  if(rocketInterval == 0 && currentlyRocketing){
    currentlyRocketing = false
  }
  
}
//function to draw the warning rockets
function drawRocketsWarning(){
  //applies the same logic for the rockets, except uses lines instead of physics bodies
  if(rocketInterval < 70 && rocketInterval > 45 && currentlyRocketing){
    var startX = vessel.position.x < 0 ? vessel.position.x + 20 : vessel.position.x - 20;
    var startY = vessel.position.y + 30;
    for(var i = 0; i < 8; i++){
      var angle;
      if(vessel.position.x < 0){
        angle = (Math.PI * i)/10 - Math.PI/6;
      } else {
        angle = -(Math.PI * i)/10 - (Math.PI * 5)/6;
      }
      var targetX = startX + 1000 * Math.cos(angle);
      var targetY = startY + 1000 * Math.sin(angle);
      screen.drawLine(startX, startY, targetX, targetY, "rgb(255, 255, 0)");
    }
  }
}
//function to clear the rockets that go off screen
function clearOffScreenHazards(){
  var allCurrentBodies = Matter.Composite.allBodies(engine.world)
  for(var i = 0; i < allCurrentBodies.length; i++){
    if(allCurrentBodies[i].label == "hazard" && ((allCurrentBodies[i].position.x < -(screen.width/2)) || (allCurrentBodies[i].position.x > (screen.width/2)) || (allCurrentBodies[i].position.y > (screen.height/2)) || (allCurrentBodies[i].position.y < -(screen.height/2)))){
      Matter.Composite.remove(engine.world, allCurrentBodies[i])
    }
    
  }
  
}

function initSpikes(){
  bossSpiking = false
  //pause in air after either jumping or teleporting above you
  midairSpikePause = 0
  //time between landing on ground and spikes forming
  preSpikeTimer = 0
  //duration spikes are out
  spikeTimer = 0
  //stops the dive from going through the floor
  canFall = false
  //stores all of the spikes
  spikeList = []
  //stores the spike warnings
  preSpikeList = []
  //ensures the spikes only form once
  spikesForming = false
  //ensures the spike warnings only form once
  preSpikesForming = false
}

function spikes(){
  //boss either teleports above you or jumps there
  if(Math.random() < 0.5) {
    bossJumpTop()
  } else {
    bossTeleportTop()
  }
  //initial conditions for spiking
  bossSpiking = true
  midairSpikePause = 40
  preSpikeTimer = 50
  spikeTimer = 30
  preSpikesForming = true
  spikesForming = true
}

function updateSpikes(){
  //countdowns time to when it starts dive
  if(midairSpikePause > 0){
    canFall = true
    midairSpikePause--
  }
  //the dive
  if(bossSpiking && midairSpikePause == 0 && canFall){
    Matter.Body.setPosition(vessel, {x: vessel.position.x, y: vessel.position.y-15})
  }
  //stops the dive and does delay between spike warnings and spikes
  if(vessel.position.y <= -65 && preSpikeTimer>0 && bossSpiking){
    canFall = false
    Matter.Body.setPosition(vessel, {x: vessel.position.x, y: -65})
    
    preSpikeTimer--
  }
  //makes the spike warnings
  if(vessel.position.y <= -65 && preSpikeTimer>0 && bossSpiking && preSpikesForming && midairSpikePause == 0){
    for(var i = 0; i<11; i++){
      preSpikeList.push(Shapes.createBox(-200 + 40 * i, -80, 10, 30, {isSensor: true, label: "warning", frictionAir: 0, restitution: 1}))
    }
    preSpikesForming = false
  }
  //makes the spikes
  if(preSpikeTimer == 0 && bossSpiking && spikesForming){
    Matter.Composite.remove(engine.world, preSpikeList)
    for(var i = 0; i<11; i++){
      spikeList.push(Shapes.createBox(-200 + 40 * i, -20, 10, 150, {isSensor: true, label: "hazard", frictionAir: 0, restitution: 1}))
    }
    spikesForming = false
  }
  //sets the time the spikes are out
  if(spikesForming == false && bossSpiking && spikeTimer>0){
    spikeTimer--
  }
  //ends the spike attack
  if(spikeTimer == 0 && bossSpiking){
    Matter.Composite.remove(engine.world, spikeList)
    bossSpiking = false
  }
  
  
}

function initSlash(){
  //all things to be reset once slash is over
  slashCounter = 0
  currentVesselPosition = vessel.position.x
  currentlySlashing = false
  slashingDirection = ""
  //timer that everything is dependent on
  slashingInterval = 0
  
  //interval for each slash to go to 
  slashingDistanceInterval = screen.width/6
  
}

//main call for slash
function slash(){
  //stores current boss position to define whether the boss should move left and right
  currentVesselPosition = vessel.position.x
  //sets slashingDirection to either left or right
  if(vessel.position.x - player.position.x > 0){
    slashingDirection = "left"
  }else{
    slashingDirection = "right"
  }
  //sets all variables to their starting values to being the slash cycle
  currentlySlashing = true
  slashingInterval = 100
  slashCounter = 1
}

//main call for udpating slash
function updateSlash(){
  //1/60 of a second after starting 
  //create a warning triangle indicating direction
  //dependent on whether slashing direction is left or right
  if(slashingInterval == 99){
    if(slashingDirection == "right"){
      warningSlash = Shapes.createPoly(vessel.position.x + 45, vessel.position.y - 10, 3, 10, {isSensor:true, label: "warning", angle:Math.PI/3}) 
    }else if(slashingDirection == "left"){
      warningSlash = Shapes.createPoly(vessel.position.x - 45, vessel.position.y - 10, 3, 10, {isSensor:true, label: "warning"}) 
    }
  }
  //moves warning slash to be wherever the boss is between time 99 and 70
  if(slashingInterval < 99 && slashingInterval > 70){
    if(slashingDirection == "right"){
      Matter.Body.setPosition(warningSlash, {x: vessel.position.x + 45, y: vessel.position.y - 10,}) 
    }else if(slashingDirection == "left"){
      Matter.Body.setPosition(warningSlash, {x: vessel.position.x - 45, y: vessel.position.y - 10}) 
    }
  }
  //removes the slash 1/2 a second a second later
  if(slashingInterval == 70){
    Matter.Composite.remove(engine.world, warningSlash)
  }
  //at time 42 create a box that does damage depending on direction
  if(slashingInterval == 42){
    if(slashingDirection == "left"){
      slashAttack = Shapes.createBox(vessel.position.x - 45, vessel.position.y - 10, 50, 50, {isSensor: true, label: "hazard"})
    }else if(slashingDirection == "right"){
      slashAttack = Shapes.createBox(vessel.position.x + 45, vessel.position.y - 10, 50, 50, {isSensor: true, label: "hazard"})
    }
  }
  //changes slash type depending on what counter it is
  if(slashingInterval == 54){
    slashCounter++
  }else if(slashingInterval == 18){
    slashCounter++
  }
  //changes slash position based off of boss position and changes based off of  slashCounter increasing
  if(currentlySlashing == true){
    if(slashingInterval <= 42 && slashAttack){
      if(slashingDirection == "left"){
        Matter.Body.setPosition(slashAttack, {x:vessel.position.x - 45, y:vessel.position.y -10})
      }else if(slashingDirection == "right"){
        Matter.Body.setPosition(slashAttack, {x:vessel.position.x + 45, y:vessel.position.y -10})
      }
    }
    if(slashingInterval <= 54 && slashCounter == 1){
      if(slashingDirection == "left" && vessel.position.x >= currentVesselPosition - slashingDistanceInterval){
        Matter.Body.setPosition(vessel, {x: vessel.position.x - 9, y:vessel.position.y})
      }else if(slashingDirection == "right" && vessel.position.x <= currentVesselPosition + slashingDistanceInterval){
        Matter.Body.setPosition(vessel, {x: vessel.position.x + 9, y:vessel.position.y})
      }
    }else if(slashCounter == 2){
      if(slashingDirection == "left" && vessel.position.x >= currentVesselPosition - 2*slashingDistanceInterval){
        Matter.Body.setPosition(vessel, {x: vessel.position.x - 9, y:vessel.position.y})
      }else if(slashingDirection == "right" && vessel.position.x <= currentVesselPosition + 2*slashingDistanceInterval){
        Matter.Body.setPosition(vessel, {x: vessel.position.x + 9, y:vessel.position.y})
      }
    }else if(slashCounter == 3 && slashingInterval > 0){
      if(slashingDirection == "left" && vessel.position.x >= currentVesselPosition - 3*slashingDistanceInterval){
        Matter.Body.setPosition(vessel, {x: vessel.position.x - 9, y:vessel.position.y})
      }else if(slashingDirection == "right" && vessel.position.x <= currentVesselPosition + 3*slashingDistanceInterval){
        Matter.Body.setPosition(vessel, {x: vessel.position.x + 9, y:vessel.position.y})
      }
    }
  } 
  //timer for counting down
  if(slashingInterval > 0){
    slashingInterval--
  }
  //at time 0 reset all variables and remove the attack
  if(slashingInterval == 0 && currentlySlashing == true){
    currentlySlashing = false 
    slashingDirection = ""
    slashCounter = 0
    Matter.Composite.remove(engine.world, slashAttack)
  }
}



</script></html>
